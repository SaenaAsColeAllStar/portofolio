<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <style>
      .eye-bulb {
        fill: #121a2c;
        stroke: #4f8cff;
      }
      .pupil {
        fill: #4f8cff;
      }
      @media (prefers-color-scheme: light) {
        .eye-bulb {
          fill: #ffffff;
          stroke: #2563eb;
        }
        .pupil {
          fill: #2563eb;
        }
      }
    </style>
  </defs>
  <!-- Left Eye -->
  <ellipse cx="10" cy="16" rx="6" ry="6" class="eye-bulb" stroke-width="2.5" />
  <!-- Right Eye -->
  <ellipse cx="22" cy="16" rx="6" ry="6" class="eye-bulb" stroke-width="2.5" />
  <!-- Pupils -->
  <circle cx="10" cy="16" r="2" class="pupil" />
  <circle cx="22" cy="16" r="2" class="pupil" />
</svg>
