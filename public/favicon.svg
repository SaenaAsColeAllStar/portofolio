<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
	<defs>
		<linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#F4C46A" />
			<stop offset="50%" stop-color="#D4A54A" />
			<stop offset="100%" stop-color="#B3862E" />
		</linearGradient>
		<style>
			@keyframes fav-pulse {
				0%, 80%, 100% {
					transform: scale(1) rotate(0deg);
					filter: brightness(1);
				}
				90% {
					transform: scale(1.08) rotate(5deg);
					filter: brightness(1.2);
				}
			}
			.fav-c {
				transform-origin: 50px 50px;
				animation: fav-pulse 3s ease-in-out infinite;
			}
		</style>
	</defs>
	<path class="fav-c" d="M 90 10 L 50 10 A 40 40 0 0 0 50 90 L 90 90 L 74 74 L 50 74 A 24 24 0 0 1 50 26 L 74 26 Z" fill="url(#gold-grad)" />
</svg>
